name: Build and Package Flutter App

on:
  workflow_dispatch:
    inputs:
      version:
        description: "手动指定版本号（例如 1.0.0，留空则自动从标签获取）"
        required: false
        default: ""
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build on Windows
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v1
        with:
          java-version: "22.x"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.2"

      - name: Build Flutter app (APK + EXE)
        uses: antinna/fa@v1
        id: build
        with:
          release: true
          apk_generation: true
          exe_generation: true
          # 如需签名，取消注释并配置 Secrets
          # keystore: ${{ secrets.KEYSTORE_BASE64 }}
          # keystore-pwd: ${{ secrets.KEYSTORE_PASSWORD }}
          # key-pwd: ${{ secrets.KEY_PASSWORD }}

      - name: Get version
        id: version
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            REF="${{ github.ref }}"
            if [[ "$REF" == refs/tags/v* ]]; then
              VERSION="${REF#refs/tags/v}"
            else
              VERSION="0.0.0-$(git rev-parse --short HEAD)"
            fi
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Get timestamp
        id: timestamp
        shell: bash
        run: |
          TS=$(date +"%Y%m%d-%H%M")
          echo "timestamp=$TS" >> $GITHUB_OUTPUT

      # ---------- 重命名 APK ----------
      - name: Rename APK
        shell: bash
        run: |
          APK_ORIG="${{ steps.build.outputs.apk-path }}"
          if [ -f "$APK_ORIG" ]; then
            VERSION="${{ steps.version.outputs.version }}"
            TS="${{ steps.timestamp.outputs.timestamp }}"
            NEW_NAME="Worder-v${VERSION}-${TS}-Android.apk"
            cp "$APK_ORIG" "$NEW_NAME"
            echo "apk_renamed=$NEW_NAME" >> $GITHUB_ENV
          else
            echo "APK file not found"
          fi

      # ---------- 打包 Windows 为 ZIP ----------
      - name: Package Windows build
        shell: bash
        run: |
          WIN_DIR="${{ steps.build.outputs.exe-path }}"
          if [ -d "$WIN_DIR" ]; then
            VERSION="${{ steps.version.outputs.version }}"
            TS="${{ steps.timestamp.outputs.timestamp }}"
            ZIP_NAME="Worder-v${VERSION}-${TS}-Windows-x64.zip"
            powershell -Command "Compress-Archive -Path '$WIN_DIR\*' -DestinationPath '$ZIP_NAME' -Force"
            echo "zip_renamed=$ZIP_NAME" >> $GITHUB_ENV
          else
            echo "Windows build folder not found"
          fi

      # ---------- 上传 Artifact（总是上传） ----------
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Worder-build
          path: |
            Worder-v*.apk
            Worder-v*.zip
          if-no-files-found: error

      # ========== 新增加的步骤：准备 Release Body ==========
      - name: Prepare release body
        id: release_body
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CHANGELOG_FILE="docs/CHANGELOG_v${VERSION}.md"

          # 读取 Changelog 文件（如果存在）
          if [ -f "$CHANGELOG_FILE" ]; then
            BODY=$(cat "$CHANGELOG_FILE")
          else
            BODY="No changelog provided for this release."
          fi

          # 追加固定提示信息（与你的要求一致）
          BODY="${BODY}\n\n> 预发布版本使用调试密钥库签名；正式签名待 1.0.0 版本进行。\n> Pre-release signed with debug keystore; production signing pending 1.0.0."

          # 将组装好的 body 设置为输出
          echo "body=$BODY" >> $GITHUB_OUTPUT

      # ---------- 创建 GitHub Release（仅在标签推送时） ----------
      - name: Create Release and upload assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: ${{ steps.release_body.outputs.body }} # 使用组装好的 body
          prerelease: true # 标记为预发布
          draft: false
          files: |
            Worder-v*.apk
            Worder-v*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
