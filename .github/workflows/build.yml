name: Build and Release (APK + Windows)

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（必填，例如 1.0.0）'
        required: true
        default: ''
      release:
        description: '是否创建 GitHub Release（预发布）'
        required: false
        default: false
        type: boolean
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build on Windows (for both Android & Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------- 设置 Java 22.x ----------
      - name: Set up Java 22
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "22"

      # ---------- 设置 Flutter 3.44.2 ----------
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.2" # 按你实际版本调整，如找不到可改为 'stable'

      # ---------- 获取项目依赖 ----------
      - name: Flutter pub get
        run: flutter pub get

      # ---------- 构建 Android APK (split per ABI) ----------
      - name: Build Android APKs (release, split-per-abi)
        run: flutter build apk --release --split-per-abi

      # ---------- 构建 Windows EXE ----------
      - name: Build Windows executable
        run: flutter build windows --release

      # ---------- 获取版本号 ----------
      - name: Get version
        id: version
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            REF="${{ github.ref }}"
            if [[ "$REF" == refs/tags/v* ]]; then
              VERSION="${REF#refs/tags/v}"
            else
              echo "Error: version not provided and not a tag push."
              exit 1
            fi
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # ---------- 生成时间戳 ----------
      - name: Get timestamp
        id: timestamp
        shell: bash
        run: |
          TS=$(date +"%Y%m%d-%H%M")
          echo "timestamp=$TS" >> $GITHUB_OUTPUT

      # ---------- 重命名 APK 文件（每个 ABI 一个） ----------
      - name: Rename APKs
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TS="${{ steps.timestamp.outputs.timestamp }}"
          # 进入 Flutter 生成的 APK 目录
          cd build/app/outputs/flutter-apk/
          for apk in app-*.apk; do
            # 提取架构名: app-armeabi-v7a-release.apk -> armeabi-v7a
            arch=$(echo "$apk" | sed -E 's/app-(.+)-release\.apk/\1/')
            new_name="Worder-v${VERSION}-${TS}-Android-${arch}.apk"
            cp "$apk" "$new_name"
            echo "Renamed $apk to $new_name"
          done
          # 将重命名后的文件移到工作区根目录以便上传
          cp Worder-*.apk "$GITHUB_WORKSPACE/"

      # ---------- 打包 Windows 发布文件夹为 ZIP ----------
      - name: Package Windows build
        shell: bash
        run: |
          # 更兼容的路径检查
          WIN_DIR="build/windows/x64/runner/Release"
          if [ ! -d "$WIN_DIR" ]; then
            WIN_DIR="build/windows/runner/Release"
          fi
          if [ -d "$WIN_DIR" ]; then
            VERSION="${{ steps.version.outputs.version }}"
            TS="${{ steps.timestamp.outputs.timestamp }}"
            ZIP_NAME="Worder-v${VERSION}-${TS}-Windows-x64.zip"
            # Windows 自带 PowerShell 压缩
            powershell -Command "Compress-Archive -Path '$WIN_DIR\*' -DestinationPath '$ZIP_NAME' -Force"
            echo "zip_renamed=$ZIP_NAME" >> $GITHUB_ENV
          else
            echo "Windows build folder not found"
            exit 1
          fi

      # ---------- 上传 Artifact（所有产物） ----------
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Worder-build
          path: |
            Worder-v*.apk
            Worder-v*.zip
          if-no-files-found: error

      # ---------- 准备 Release Body（Changelog + 固定提示） ----------
      - name: Prepare release body
        id: release_body
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CHANGELOG_FILE="docs/CHANGELOG_v${VERSION}.md"
          if [ -f "$CHANGELOG_FILE" ]; then
            BODY=$(cat "$CHANGELOG_FILE")
          else
            BODY="No changelog provided for this release."
          fi
          # 追加固定提示，使用 $'\n' 插入换行
          BODY="${BODY}"$'\n\n'"> 预发布版本使用调试密钥库签名；正式签名待 1.0.0 版本进行。Pre-release signed with debug keystore; production signing pending 1.0.0."

          # 使用 heredoc 安全写入多行内容
          {
            echo 'body<<GH_OUTPUT_EOF'
            echo "$BODY"
            echo 'GH_OUTPUT_EOF'
          } >> "$GITHUB_OUTPUT"

      # ---------- 创建 GitHub Release（仅在标签触发时） ----------
      - name: Create Release and upload assets
        if: |
          (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.release)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'push' && github.ref_name || format('v{0}', github.event.inputs.version) }}
          name: Release ${{ github.event_name == 'push' && github.ref_name || format('v{0}', github.event.inputs.version) }}
          body: ${{ steps.release_body.outputs.body }}
          prerelease: true
          draft: false
          files: |
            Worder-v*.apk
            Worder-v*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
