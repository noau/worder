name: worder
description: "A word collector for Writers."
publish_to: 'none'

version: 0.0.0+0

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.9
  bot_toast: ^4.1.3
  font_awesome_flutter: ^11.0.0
  adaptive_dialog: ^2.8.0
  uuid: ^4.5.3
  another_flutter_splash_screen: ^1.2.1
  path: ^1.9.1
  path_provider: ^2.1.5
  auto_route: ^11.1.0
  fsrs: ^2.0.1
  window_manager: ^0.5.1
  adaptive_theme: ^3.7.2
  shared_preferences: ^2.5.5
  json_annotation: ^4.12.0
  responsive_framework: ^1.5.1
  signals: ^7.1.0
  provider: ^6.1.5+1
  collection: ^1.19.1
  animated_switcher_plus: ^1.4.0
  skeletonizer: ^2.1.3
  drift: ^2.34.0
  drift_flutter: ^0.3.0
  openai_dart: ^6.2.0
  logging: ^1.3.0
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  flutter_launcher_icons: ^0.14.4
  auto_route_generator: ^10.5.0
  json_serializable: ^6.14.0
  drift_dev: ^2.34.0

flutter:

  generate: true
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
